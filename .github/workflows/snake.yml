name: Generate Snake

on:
  # Off the top of the hour to dodge GitHub's cron queue spike.
  schedule: [{cron: "17 */12 * * *"}]
  workflow_dispatch:
  push: {branches: [main]}

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Platane/snk svg-only@v3 pinned by SHA for supply-chain safety.
      - uses: Platane/snk/svg-only@e2cedf76a2c05b25d09a6428ded69727b497a700
        with:
          github_user_name: Dream-Debugger-Dev
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # crazy-max/ghaction-github-pages@v5.0.0 pinned by SHA.
      - uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
